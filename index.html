<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>James Shill | Mechanical Engineer</title>
  <meta name="description" content="James Shill — Mechanical Engineer. Experience across hygienic/sanitary design environments and minerals processing, from calculations to procurement and project engineering support." />

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --ink:#0b1220;
      --muted:#4b5563;
      --accent:#2563eb;
      --accent2:#0f172a;
      --pill:#e7efff;
      --pillink:#1e3a8a;
      --border: rgba(15, 23, 42, 0.08);
      --shadow: 0 10px 24px rgba(2, 6, 23, 0.08);
      --radius: 16px;
    }
    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: var(--bg);
      color: var(--ink);
      line-height:1.55;
    }
    a{ color: var(--accent); text-decoration:none; }
    a:hover{ text-decoration:underline; }

    /* HEADER */
    .topbar{
      background: linear-gradient(135deg, var(--accent2), #1f2a44);
      color:#fff;
      padding: 54px 0 56px; /* extra bottom space to accommodate overlap */
      position: relative;
      overflow: visible;
    }

    .wrap{ max-width: 980px; margin: 0 auto; padding: 0 20px; }

    .hero{
      display:flex;
      gap:22px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .hero h1{ margin:0; font-size: 2.25rem; letter-spacing: -0.02em; }
    .hero .role{ margin-top:8px; opacity:0.92; font-size:1.05rem; }
    .hero .meta{
      margin-top: 12px;
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      opacity: 0.92;
      font-size: 0.98rem;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 8px 12px;
      gap:10px;
    }

    /* ✅ HERO-STYLE PROFILE PHOTO */
    .hero-left{
      display:flex;
      gap: 18px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .profile-pic{
      width: 240px;
      height: 240px;
      border-radius: 20px;
      object-fit: cover;
      object-position: center top; /* tends to crop nicely for portraits */
      border: 3px solid #ffffff;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
      transform: translateY(22px); /* ✅ overlap down into the page */
      background: rgba(255,255,255,0.10);
    }

    /* MAIN */
    main{
      padding: 28px 0 60px;
    }

    /* create a little space at the top so the overlapped image doesn't crash into content */
    .top-spacer{
      height: 30px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1.2fr 0.8fr;
